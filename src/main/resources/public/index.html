<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Crypto Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
</head>
<body>

<header>
    <h1>Crypto Simulator</h1>
    <p class="subtitle">Симулятор криптовалютних транзакцій у замкнутій системі</p>
</header>

<main>
    <section class="config-section">
        <h2>Параметри симуляції</h2>
        <form id="config-form">
            <div class="field">
                <label for="numWallets">Кількість гаманців:</label>
                <input type="number" id="numWallets" value="10" min="2" max="100">
            </div>
            <div class="field">
                <label for="initialBalance">Початковий баланс:</label>
                <input type="number" id="initialBalance" value="1000" min="0">
            </div>
            <div class="field">
                <label for="difficultyBits">Складність (біт):</label>
                <input type="number" id="difficultyBits" value="12" min="0" max="24">
            </div>
            <div class="field">
                <label for="totalTicks">Тривалість (тіків):</label>
                <input type="number" id="totalTicks" value="10000" min="100">
            </div>
            <div class="field">
                <label for="ticksPerTransaction">Тіків між транзакціями:</label>
                <input type="number" id="ticksPerTransaction" value="100" min="1">
            </div>
            <div class="field">
                <label for="ticksPerBlock">Тіків між блоками:</label>
                <input type="number" id="ticksPerBlock" value="1000" min="1">
            </div>
            <div class="field">
                <label for="mempoolMaxSize">Розмір мемпулу:</label>
                <input type="number" id="mempoolMaxSize" value="100" min="1">
            </div>
            <div class="field">
                <label for="seed">Seed (для відтворюваності):</label>
                <input type="number" id="seed" value="42">
            </div>

            <button type="submit" id="run-btn">Запустити симуляцію</button>
        </form>
    </section>

    <section class="results-section" id="results-section" hidden>
        <h2>Результати</h2>
        <div id="status"></div>
        <div id="metrics"></div>
        <div class="charts">
            <div class="chart-container">
                <h3>Розподіл балансів</h3>
                <canvas id="balances-chart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Транзакції у блоках</h3>
                <canvas id="blocks-chart"></canvas>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>Solomiia Bobiak ~ 2026 </p>
</footer>

<script src="app.js"></script>
</body>
</html>
